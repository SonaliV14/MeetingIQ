# Only the stores needed for PLAIN synthetic-data creation + load are enabled.
# Neo4j / Chroma / Redis / Elasticsearch belong to the LATER context layer
# (embedding, graph, chunking) and are intentionally commented out here.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: meetingiq
      POSTGRES_PASSWORD: meetingiq
      POSTGRES_DB: meetingiq
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  # ---- LATER (context layer; not needed for plain synth data) ----
  # neo4j:        { image: neo4j:5-community, ports: ["7474:7474","7687:7687"] }
  # qdrant:       { image: qdrant/qdrant, ports: ["6333:6333"] }
  # redis:        { image: redis:7, ports: ["6379:6379"] }
  # elasticsearch:{ image: elasticsearch:8.14.0, ports: ["9200:9200"] }

volumes:
  pgdata:
  miniodata:
